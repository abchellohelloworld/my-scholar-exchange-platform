{% extends "base.html" %}

{% block content %}
<h1>Recent Posts</h1>
{% for post in posts %}
<div class="card mb-3">
    <div class="card-body">
        <h5 class="card-title">{{ post.title }}</h5>
        <p class="card-text">{{ post.content[:200] }}{% if post.content|length > 200 %}...{% endif %}</p>
        <p class="text-muted">Posted by {{ post.author.username }} on {{ post.timestamp.strftime('%Y-%m-%d') }}</p>
        <a href="{{ url_for('view_post', id=post.id) }}" class="btn btn-primary">View Post</a>
    </div>
</div>
{% endfor %}
{% endblock %}
